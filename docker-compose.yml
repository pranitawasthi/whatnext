services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/whatnext.db
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: content_embeddings
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      EXPLANATION_MODEL: ${EXPLANATION_MODEL:-llama-3.3-70b-versatile}
      HF_HOME: /models/huggingface
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - sqlite_data:/data
      - hf_cache:/models/huggingface

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
  qdrant_data:
  hf_cache:
